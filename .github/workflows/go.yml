name: Go

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:

  test:
    name: Vet and Test
    runs-on: ubuntu-24.04

    steps:

      - name: Check out code into the Go module directory
        uses: actions/checkout@v4

      - name: Set up Go 1.x
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
        id: go

      - name: Configure github token
        env:
          TOKEN_USER: ${{ secrets.WORKFLOW_TOKEN_USER }}
          TOKEN: ${{ secrets.WORKFLOW_TOKEN}}
        run: |
          git config --global url."https://${TOKEN_USER}:${TOKEN}@github.com".insteadOf "https://github.com"

      - name: Get dependencies
        env:
          TOKEN_USER: ${{ secrets.WORKFLOW_TOKEN_USER }}
          TOKEN: ${{ secrets.WORKFLOW_TOKEN}}
        run: |
          git config -l --global
          go get -v -t -d ./...

      - name: Verify go.mod is tidy
        env:
          TOKEN_USER: ${{ secrets.WORKFLOW_TOKEN_USER }}
          TOKEN: ${{ secrets.WORKFLOW_TOKEN}}
        run: go mod tidy && git diff --exit-code go.* || (echo "go.mod or go.sum not tidy" && exit 1)

      - name: Generate
        run: |
          go generate ./...
        env:
          CI: false

      - name: Vet
        run: |
          go vet ./...

      - name: Test Race Conditions
        run: go test -race -v ./...

  fuzz:
    name: Fuzz
    needs: test
    runs-on: ubuntu-24.04
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v4

      - name: Set up Go 1.x
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
        id: go
      - name: Configure github token
        env:
          TOKEN_USER: ${{ secrets.WORKFLOW_TOKEN_USER }}
          TOKEN: ${{ secrets.WORKFLOW_TOKEN}}
        run: |
          git config --global url."https://${TOKEN_USER}:${TOKEN}@github.com".insteadOf "https://github.com"

      - name: Get dependencies
        env:
          TOKEN_USER: ${{ secrets.WORKFLOW_TOKEN_USER }}
          TOKEN: ${{ secrets.WORKFLOW_TOKEN}}
        run: |
          go get -v -t -d ./...

      - name: Fuzz CanonicalData
        run: go test -fuzz FuzzCanonicalData -fuzztime 10s ./http/hmac

      - name: Fuzz AuthRequest
        run: go test -fuzz FuzzAuthRequest -fuzztime 10s ./http/hmac

      - name: Fuzz DecodeTokenData
        run: go test -fuzz FuzzDecodeTokenData -fuzztime 10s ./oidc

      - name: Output Fuzzing Crashers
        if: failure()
        run: |
          echo "Fuzzing failed. Checking for crashers..."
          find . -path "*/testdata/fuzz/*" -type f | head -n 10 | while read crasher; do
            echo "Crasher: $crasher"
            cat "$crasher"
            echo ""
          done

      - name: Upload Fuzzing Crashers
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashers
          path: "**/testdata/fuzz/**"
          if-no-files-found: ignore

  build:
    name: Build
    needs: test
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        os: [ darwin, linux ]
        arch: [ amd64 ]
        include:
          - os: linux
            arch: arm64
          - os: darwin
            arch: arm64

    env:
      GOOS: ${{ matrix.os }}
      GOARCH: ${{ matrix.arch }}
      OUTPUT_BINARY: ${{ github.event.repository.name }}_${{ matrix.os }}_${{ matrix.arch }}
      OUTPUT_ZIP: ${{ github.event.repository.name }}_${{ matrix.os }}_${{ matrix.arch }}.zip

    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v4

      - name: Set commit date
        run: echo "COMMIT_DATE=$(git show -s --format=%ci ${{ github.sha }})" >> "$GITHUB_ENV"

      - name: Set up Go 1.x
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
        id: go

      - name: Configure github token
        env:
          TOKEN_USER: ${{ secrets.WORKFLOW_TOKEN_USER }}
          TOKEN: ${{ secrets.WORKFLOW_TOKEN}}
        run: |
          git config --global url."https://${TOKEN_USER}:${TOKEN}@github.com".insteadOf "https://github.com"

      - name: Get dependencies
        run: |
          git config -l --global
          go get -v -t -d ./...

      - name: Build
        run: |
          go generate ./...
          go build -v ./...
          go build -o auth-debug -v ./cmd/auth-debug
          zip ${{ env.OUTPUT_ZIP }} auth-debug
        env:
          CI: false
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OUTPUT_ZIP }}
          path: ${{ env.OUTPUT_ZIP }}

      - name: Build Examples
        run: |
          for dir in examples/*/; do
            if [ -f "$dir/main.go" ]; then
              echo "Building $dir..."
              go build "./$dir..." || exit 1
            fi
          done
          # Also build subdirectories with main.go (e.g., githubactions-oidc/client)
          for dir in examples/*/*/; do
            if [ -f "$dir/main.go" ]; then
              echo "Building $dir..."
              go build "./$dir..." || exit 1
            fi
          done
          echo "All examples built successfully"

      - name: Upload S3 Release Asset
        id: upload-s3-release-asset
        if: github.event_name == 'push'
        env:
          AWS_S3_BUCKET: releases.lab.dioad.net
          AWS_ACCESS_KEY_ID: ${{ secrets.ARTIFACT_UPLOAD_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.ARTIFACT_UPLOAD_S3_SECRET_ACCESS_KEY }}
          AWS_REGION: 'eu-west-2'
        run: |
          sha256sum ${{ env.OUTPUT_ZIP }} > ${{ env.OUTPUT_ZIP }}_SHA256SUMS
          aws s3api put-object \
             --body ${{ env.OUTPUT_ZIP }} \
             --bucket ${{ env.AWS_S3_BUCKET }} \
             --key data/${{ github.event.repository.name }}/build/${{ env.OUTPUT_ZIP }} \
             --tagging "Dioad/Project=${{ github.event.repository.name }}&Dioad/Version=${{ github.ref_type }}/${{ github.ref_name }}&Dioad/Commit=${{ github.sha }}&Dioad/CommitDate=${{ env.COMMIT_DATE }}&Dioad/OS=${{ matrix.os }}&Dioad/Architecture=${{ matrix.arch }}" \
             --content-type "application/zip" \
             --server-side-encryption AES256
          aws s3 cp ${{ env.OUTPUT_ZIP }}_SHA256SUMS s3://${{ env.AWS_S3_BUCKET }}/data/${{ github.event.repository.name }}/build/${{ env.OUTPUT_ZIP }}_SHA256SUMS \
             --no-guess-mime-type \
             --content-type "text/plain" \
             --no-progress \
             --sse AES256
